version: "3.5"

x-volumes: &volumes
  - .${WARDEN_WEB_ROOT:-}/media:/var/www/html/media:delegated
  - appdata:/var/www/html

services:
  nginx:
    environment:
      - XDEBUG_CONNECT_BACK_HOST=${XDEBUG_CONNECT_BACK_HOST:-host.docker.internal}
    volumes: *volumes

  php-fpm: { volumes: *volumes }
  php-debug: { volumes: *volumes }

volumes:
  appdata:
